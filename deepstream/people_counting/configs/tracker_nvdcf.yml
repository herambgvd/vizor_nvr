# NvDCF tracker — DeepStream 7.x default. Optimized for person tracking
# at 640x360 internal resolution with re-association via appearance.

BaseConfig:
  minDetectorConfidence: 0.30

TargetManagement:
  enableBboxUnClipping: 1
  maxTargetsPerStream: 100
  minIouDiff4NewTarget: 0.5
  minTrackerConfidence: 0.6
  probationAge: 3
  maxShadowTrackingAge: 30
  earlyTerminationAge: 1

TrajectoryManagement:
  useUniqueID: 0
  enableReAssoc: 1
  minTrajectoryLength4Projection: 20
  prepLength4TrajectoryProjection: 10
  trajectoryProjectionLength: 90
  maxAngle4TrackletMatching: 30
  minSpeedSimilarity4TrackletMatching: 0.2
  minBboxSizeSimilarity4TrackletMatching: 0.6
  maxTrackletMatchingTimeSearchRange: 20

DataAssociator:
  dataAssociatorType: 0
  associationMatcherType: 1
  checkClassMatch: 1
  minMatchingScore4Overall: 0.0
  minMatchingScore4SizeSimilarity: 0.6
  minMatchingScore4Iou: 0.0
  minMatchingScore4VisualSimilarity: 0.7
  minTrackingConfidenceDuringInactive: 1.0

StateEstimator:
  stateEstimatorType: 1
  processNoiseVar4Loc: 2.0
  processNoiseVar4Size: 1.0
  processNoiseVar4Vel: 0.1
  measurementNoiseVar4Detector: 4.0
  measurementNoiseVar4Tracker: 16.0

VisualTracker:
  visualTrackerType: 1
  useColorNames: 1
  useHog: 1
  featureImgSizeLevel: 2
  featureFocusOffsetFactor_y: -0.2
  filterLr: 0.075
  filterChannelWeightsLr: 0.1
  gaussianSigma: 0.75
