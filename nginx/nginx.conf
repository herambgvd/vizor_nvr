# =============================================================================
# GVD NVR — Nginx Reverse Proxy
# =============================================================================
# Routes:
#   /api/*        → backend:8000
#   /api/ws/*     → backend:8000 (WebSocket upgrade)
#   /go2rtc/*     → go2rtc:1984  (WebRTC signalling, stream API)
#   /recordings/* → static recordings files
#   /thumbnails/* → static thumbnail files
#   /exports/*    → static export files
#   /*            → frontend SPA

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Upload limit for API requests
    client_max_body_size 64m;

    # ── Upstream definitions ───────────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream go2rtc {
        server host-gateway:1984;
        keepalive 16;
    }

    upstream frontend {
        server frontend:80;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Allow ACME challenge for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Main HTTPS server ─────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL — replace with your cert/key paths or use Let's Encrypt
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── WebSocket — API (must come before /api/) ──────────────────────
        location /api/ws {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Backend API ───────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # ── ONVIF Device SOAP endpoints ───────────────────────────────────
        location /onvif/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # ── go2rtc (WebRTC + stream API) ──────────────────────────────────
        location /go2rtc/ {
            rewrite ^/go2rtc(/.*)$ $1 break;
            proxy_pass http://go2rtc;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # ── Static files served directly by nginx ────────────────────────
        location /recordings/ {
            alias /data/recordings/;
            expires 1d;
            add_header Cache-Control "public";
            # Prevent directory listing
            autoindex off;
        }

        location /thumbnails/ {
            alias /data/thumbnails/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            autoindex off;
        }

        location /exports/ {
            alias /data/exports/;
            expires 1h;
            autoindex off;
        }

        # ── Frontend SPA ──────────────────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Cache HTML minimally so SPA updates propagate
            add_header Cache-Control "no-cache";
        }
    }

    # ── Plain HTTP fallback (if no SSL certs yet) ─────────────────────────
    # Comment out the HTTPS server above and uncomment this block during
    # initial setup / local dev without TLS:
    #
    # server {
    #     listen 80;
    #     server_name _;
    #
    #     location /api/ws { ... }   # same blocks as above but no SSL
    #     location /api/ { ... }
    #     location /go2rtc/ { ... }
    #     location /recordings/ { ... }
    #     location /thumbnails/ { ... }
    #     location /exports/ { ... }
    #     location / { proxy_pass http://frontend; }
    # }
}
