# =============================================================================
# go2rtc runtime config
# =============================================================================
# Generated from go2rtc.yaml.template by install.sh /
# scripts/generate-go2rtc-config.py. Edit the template or env vars
# rather than this file for production.
# =============================================================================

api:
  listen: ":1984"
  origin: "*"     # CORS — nginx already gates external access

rtsp:
  listen: ":8554"

webrtc:
  listen: ":8555"
  candidates:
    - 127.0.0.1:8555
    - stun:8555

# H.264 and H.265 are both supported on the RTSP ingest side. Most
# browsers only decode H.264 over WebRTC, so we transcode H.265
# (HEVC) sources to H.264 on demand. The default ffmpeg presets ship
# with the alexxit/go2rtc image; this `ffmpeg` block exposes them as
# `ffmpeg:<source>` URLs that the backend can construct when a stream
# advertises HEVC.
ffmpeg:
  bin: ffmpeg
  # Re-encode incoming H.265 → H.264 baseline with low-latency tuning.
  # zerolatency drops B-frames so first-frame appears in <1s on WebRTC.
  h265: "-fflags nobuffer -flags low_delay -rtsp_transport tcp -i {input} -c:v libx264 -preset ultrafast -tune zerolatency -profile:v baseline -level 4.1 -bf 0 -g 50 -pix_fmt yuv420p -an -f rtsp {output}"

log:
  level: info

# Per-camera streams are pushed in dynamically by the backend via the
# go2rtc HTTP API. Keep this section empty in committed config.
