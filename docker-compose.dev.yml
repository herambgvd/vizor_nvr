# =============================================================================
# Development overlay — hot reload for backend + frontend
# =============================================================================
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# What this does:
#   • Backend: bind-mounts ./backend, runs uvicorn with --reload so Python
#     edits hot-reload in <1 s. Adds dev deps (pytest, ruff, etc.).
#   • Frontend: replaces the nginx static build with `npm start` so React
#     fast-refresh works in the browser tab.
#   • Nginx stays running to serve HTTPS + proxy /api → backend. Frontend
#     dev server lives on port 3000 (host) and proxies upstream changes.
# =============================================================================

services:
  backend:
    # uvicorn --reload watches the bind-mounted source and restarts on edit
    command: >
      python -m uvicorn app.main:app
      --host 0.0.0.0 --port 8000
      --reload
      --reload-dir /app/app
      --reload-dir /app/migrations
    volumes:
      # Bind-mount the source tree so saves on the host trigger reload
      # inside the container. /app/data + caches stay on named volumes.
      - ./backend:/app
      - recordings:/data/recordings
      - thumbnails:/data/thumbnails
      - exports:/data/exports
      - certs:/data/certs
    environment:
      ENV: development
      PYTHONUNBUFFERED: "1"
      WATCHFILES_FORCE_POLLING: "true"   # required on some macOS / WSL hosts
      # Force all data paths to /data (managed volume) — the bind-mount
      # replaces /app with the host source tree which doesn't have a
      # writable data/ folder owned by uid 1001.
      STORAGE_PATH: /data/recordings
      THUMBNAIL_PATH: /data/thumbnails
      EXPORT_PATH: /data/exports
      DATA_PATH: /data
      CERT_PATH: /data/certs
      HLS_PATH: /data/hls

  frontend:
    # Replace the production nginx static image with the CRA dev server
    # (craco start) so edits fast-refresh in the browser. It listens on
    # PORT=80 so nginx's existing `frontend:80` upstream keeps working —
    # the app stays on the same https://localhost URL, no port juggling.
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install --legacy-peer-deps && npm start"
    # CRA dev server + npm install need far more than the prod nginx's 64 MB cap.
    deploy:
      resources:
        limits:
          memory: 4g
    volumes:
      - ./frontend:/app
      - /app/node_modules    # keep installed deps inside the container
    environment:
      PORT: "80"                         # match nginx upstream frontend:80
      CHOKIDAR_USEPOLLING: "true"        # required on Linux bind mounts
      WATCHPACK_POLLING: "true"
      FAST_REFRESH: "true"
      WDS_SOCKET_PORT: "0"               # HMR socket over the page's own port (nginx 443)
      BROWSER: "none"
    # No healthcheck — CRA dev server doesn't expose /health
    healthcheck:
      disable: true

  # ── AI scenario plugins — hot reload (source mount + uvicorn --reload) ──
  # Each plugin's app code is bind-mounted and run under uvicorn --reload, so
  # Python edits restart the worker in <1 s without a docker rebuild. Models +
  # data volumes are inherited from docker-compose.ai.yml.
  frs:
    command: >
      python -m uvicorn app:app --host 0.0.0.0 --port 8093 --reload --reload-dir /app
    volumes:
      - ./scenarios/frs:/app
      - recordings:/data/recordings:ro
      - frs_photos:/data/frs
      - ./models:/models:ro
    healthcheck:
      disable: true

  ppe:
    command: >
      python -m uvicorn app:app --host 0.0.0.0 --port 8092 --reload --reload-dir /app
    volumes:
      - ./scenarios/ppe:/app
      - recordings:/data/recordings:ro
      - ./models:/models:ro
    healthcheck:
      disable: true

  suspect-search:
    command: >
      python -m uvicorn app:app --host 0.0.0.0 --port 8091 --reload --reload-dir /app
    volumes:
      - ./scenarios/suspect-search:/app
      - recordings:/data/recordings:ro
      - ./models:/models:ro
    healthcheck:
      disable: true
