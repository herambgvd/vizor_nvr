apiVersion: v1
kind: ConfigMap
metadata:
  name: gvd-nvr-config
  namespace: gvd-nvr
data:
  ENV: "production"
  JWT_ACCESS_TOKEN_EXPIRE_HOURS: "24"
  JWT_REFRESH_TOKEN_EXPIRE_DAYS: "30"
  CORS_ORIGINS: "https://nvr.example.com"
  STORAGE_PATH: "/data/recordings"
  THUMBNAIL_PATH: "/data/thumbnails"
  EXPORT_PATH: "/data/exports"
  CERT_PATH: "/data/certs"
  NGINX_CERT_PATH: "/data/certs"
  GO2RTC_URL: "http://gvd-go2rtc:1984"
  GO2RTC_RTSP_PORT: "8554"
  DEFAULT_SEGMENT_DURATION: "900"
  FFMPEG_RECOVERY_ENABLED: "true"
  HARDWARE_TRANSCODING: "auto"
  ONVIF_DEVICE_USERNAME: "admin"
  LOG_LEVEL: "INFO"
  HOST: "0.0.0.0"
  PORT: "8000"
