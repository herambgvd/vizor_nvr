apiVersion: apps/v1
kind: Deployment
metadata:
  name: gvd-backend
  namespace: gvd-nvr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gvd-backend
  template:
    metadata:
      labels:
        app: gvd-backend
    spec:
      initContainers:
        - name: migrate
          image: gvd-nvr-backend:latest
          command: ["python", "-m", "alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://nvr:$(DB_PASSWORD)@gvd-postgres:5432/gvd_nvr"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gvd-nvr-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
      containers:
        - name: backend
          image: gvd-nvr-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: gvd-nvr-config
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://nvr:$(DB_PASSWORD)@gvd-postgres:5432/gvd_nvr"
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: gvd-nvr-secrets
                  key: JWT_SECRET_KEY
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gvd-nvr-secrets
                  key: DB_PASSWORD
            - name: ONVIF_DEVICE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gvd-nvr-secrets
                  key: ONVIF_DEVICE_PASSWORD
            - name: CLOUD_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: gvd-nvr-secrets
                  key: CLOUD_S3_ACCESS_KEY
            - name: CLOUD_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: gvd-nvr-secrets
                  key: CLOUD_S3_SECRET_KEY
          volumeMounts:
            - name: recordings
              mountPath: /data/recordings
            - name: thumbnails
              mountPath: /data/thumbnails
            - name: exports
              mountPath: /data/exports
            - name: certs
              mountPath: /data/certs
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: recordings
          persistentVolumeClaim:
            claimName: gvd-recordings
        - name: thumbnails
          persistentVolumeClaim:
            claimName: gvd-thumbnails
        - name: exports
          persistentVolumeClaim:
            claimName: gvd-exports
        - name: certs
          persistentVolumeClaim:
            claimName: gvd-certs
---
apiVersion: v1
kind: Service
metadata:
  name: gvd-backend
  namespace: gvd-nvr
spec:
  selector:
    app: gvd-backend
  ports:
    - port: 8000
      targetPort: 8000
