apiVersion: apps/v1
kind: Deployment
metadata:
  name: gvd-frontend
  namespace: gvd-nvr
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gvd-frontend
  template:
    metadata:
      labels:
        app: gvd-frontend
    spec:
      containers:
        - name: frontend
          image: gvd-nvr-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gvd-frontend
  namespace: gvd-nvr
spec:
  selector:
    app: gvd-frontend
  ports:
    - port: 80
      targetPort: 80
