# =============================================================================
# Ingress — requires an Ingress Controller (nginx-ingress, traefik, etc.)
# =============================================================================
# For bare-metal clusters, consider using MetalLB + nginx-ingress.
# For cloud clusters, this works with any LoadBalancer-backed ingress.
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gvd-nvr
  namespace: gvd-nvr
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "64m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # WebSocket support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-set-headers: |
      Upgrade $http_upgrade
      Connection "upgrade"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - nvr.example.com
      secretName: gvd-nvr-tls
  rules:
    - host: nvr.example.com
      http:
        paths:
          # API + WebSocket
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gvd-backend
                port:
                  number: 8000
          # ONVIF device SOAP endpoints
          - path: /onvif
            pathType: Prefix
            backend:
              service:
                name: gvd-backend
                port:
                  number: 8000
          # go2rtc proxy (requires nginx-ingress to proxy to hostNetwork pod)
          - path: /go2rtc
            pathType: Prefix
            backend:
              service:
                name: gvd-backend
                port:
                  number: 8000
          # Everything else → frontend SPA
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gvd-frontend
                port:
                  number: 80
