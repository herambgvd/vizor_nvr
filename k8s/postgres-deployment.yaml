apiVersion: apps/v1
kind: Deployment
metadata:
  name: gvd-postgres
  namespace: gvd-nvr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gvd-postgres
  template:
    metadata:
      labels:
        app: gvd-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "gvd_nvr"
            - name: POSTGRES_USER
              value: "nvr"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gvd-nvr-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - nvr
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - nvr
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: gvd-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: gvd-postgres
  namespace: gvd-nvr
spec:
  selector:
    app: gvd-postgres
  ports:
    - port: 5432
      targetPort: 5432
