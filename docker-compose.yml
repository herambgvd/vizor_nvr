# =============================================================================
# GVD NVR — Docker Compose (production)
# =============================================================================
# Usage:
#   cp .env.example .env          # fill in required values
#   docker compose up -d
#
# Services:
#   db        — PostgreSQL 16
#   go2rtc    — RTSP restreamer + WebRTC gateway
#   backend   — FastAPI NVR API
#   frontend  — React SPA served by nginx
#   nginx     — Reverse proxy (HTTPS termination, routes /api → backend)
# =============================================================================

version: "3.9"

services:

  # ── PostgreSQL + TimescaleDB ──────────────────────────────────────────────
  # TimescaleDB image is Postgres 16 with the timescaledb extension
  # pre-installed. Migration phase9_timescale activates it. Hypertables
  # power our events history at scale (compression + retention + continuous
  # aggregates). Plain postgres:16-alpine works too but loses scale features.
  db:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: gvd_db
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      POSTGRES_DB: gvd_nvr
      POSTGRES_USER: ${DB_USER:-nvr}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - db_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 6g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nvr} -d gvd_nvr"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── go2rtc ─────────────────────────────────────────────────────────────────
  # On Linux we used to run with `network_mode: host` so STUN/UDP
  # multicast worked end-to-end. That mode is broken on macOS / Windows
  # Docker Desktop (containers live in a VM, "host" is the VM, not the
  # Mac), and the backend couldn't reach go2rtc at all. Running on the
  # shared internal bridge with explicit port mappings works everywhere.
  go2rtc:
    image: alexxit/go2rtc:1.9.9
    container_name: gvd_go2rtc
    restart: unless-stopped
    networks:
      - internal
    ports:
      # go2rtc is accessed through nginx proxy at /go2rtc
      # Do not expose directly to avoid bypassing auth and CORS controls
      - "8554:8554"          # RTSP restream (required for camera ingestion)
      - "8555:8555/tcp"      # WebRTC TCP fallback
      - "8555:8555/udp"      # WebRTC UDP
    volumes:
      # NOT read-only: go2rtc rewrites this file every time we add a
      # stream via PUT /api/streams. Keeping it writable lets dynamic
      # stream registration survive a container restart.
      - ./go2rtc.yaml:/config/go2rtc.yaml
      - go2rtc_data:/tmp/go2rtc
    environment:
      - GO2RTC_CONFIG=/config/go2rtc.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:1984/api/streams || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2g
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gvd_backend
    hostname: ${NVR_NODE_ID:-gvd-nvr-node-1}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      ENV: ${ENV:-production}
      # Dev/test signing tree (vendor-keys/). Override per-env in prod.
      LICENSE_PUBLIC_KEY: ${LICENSE_PUBLIC_KEY:-MCowBQYDK2VwAyEADRkzsd1Xaxj2/zmTvrN2EFgj5tkbgIVBb5Rujvrcx4k=}
      # FRS image/video recognition proxies to the bridge HTTP API. Bridge runs
      # on the host (--network host) so reach it via host.docker.internal.
      BRIDGE_HTTP_URL: ${BRIDGE_HTTP_URL:-http://host.docker.internal:8099}
      ENABLE_AI_MODULES: ${ENABLE_AI_MODULES:-true}
      AI_PLUGIN_SERVICE_TOKEN: ${AI_PLUGIN_SERVICE_TOKEN:-dev-XNrW79MQknM38BVGRkDZWrUQhJsJ2HUBbYfTOkWAZY0}
      AI_PLUGIN_PROXY_TIMEOUT: ${AI_PLUGIN_PROXY_TIMEOUT:-30}
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-nvr}:${DB_PASSWORD}@db:5432/gvd_nvr
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      JWT_ACCESS_TOKEN_EXPIRE_HOURS: ${JWT_ACCESS_TOKEN_EXPIRE_HOURS:-24}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-30}
      NVR_NODE_ID: ${NVR_NODE_ID:-gvd-nvr-node-1}
      CLUSTER_FAILOVER_EVENTS_ENABLED: ${CLUSTER_FAILOVER_EVENTS_ENABLED:-false}
      GO2RTC_URL: http://go2rtc:1984
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      ONVIF_XADDR_HOST: ${ONVIF_XADDR_HOST:-}
      ONVIF_DEVICE_USERNAME: ${ONVIF_DEVICE_USERNAME:-admin}
      ONVIF_DEVICE_PASSWORD: ${ONVIF_DEVICE_PASSWORD:-admin}
      # CIDR scanned by ONVIF discovery when WS-Discovery returns 0
      # results. Required: backend runs in Docker bridge so it can't
      # reach LAN multicast, and its auto-detected subnet is the bridge
      # subnet (172.x). Operator must set this to the real LAN CIDR.
      LAN_SUBNET: ${LAN_SUBNET:?LAN_SUBNET is required — set to your LAN CIDR (e.g. 192.168.1.0/24)}
      STORAGE_PATH: /data/recordings
      THUMBNAIL_PATH: /data/thumbnails
      EXPORT_PATH: /data/exports
      HLS_PATH: /data/hls
      DATA_PATH: /data
      CERT_PATH: /data/certs
      NGINX_CERT_PATH: /data/certs    # shared volume — nginx mounts the same dir
      CLOUD_STORAGE_ENABLED: ${CLOUD_STORAGE_ENABLED:-false}
      CLOUD_S3_ENDPOINT: ${CLOUD_S3_ENDPOINT:-}
      CLOUD_S3_BUCKET: ${CLOUD_S3_BUCKET:-}
      CLOUD_S3_ACCESS_KEY: ${CLOUD_S3_ACCESS_KEY:-}
      CLOUD_S3_SECRET_KEY: ${CLOUD_S3_SECRET_KEY:-}
      REDIS_URL: redis://redis:6379/0
      # AI scenario containers own GPU inference. Keep the NVR core free of a
      # hard NVIDIA runtime dependency so recording/playback still starts when
      # the host driver stack is temporarily unhealthy.
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-void}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-utility}
    volumes:
      # Base volume for /data so persistent state that lives directly under
      # /data — license.lic and .machine_id (the license fingerprint cache) —
      # survives container recreation (image rebuild / `up -d`). Without it the
      # license is wiped AND the fingerprint regenerates on every recreate,
      # invalidating any installed license. The more-specific mounts below take
      # precedence for their own subpaths.
      - appdata:/data
      - recordings:/data/recordings
      - thumbnails:/data/thumbnails
      - exports:/data/exports
      - hls:/data/hls
      - certs:/data/certs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - internal
    # NAS mounting (SMB / NFS / iSCSI) needs CAP_SYS_ADMIN inside the
    # container, otherwise `mount` returns "operation not permitted" and
    # the storage UI flashes a 500. Safer alternative for production:
    # mount the NAS share on the host, then bind-mount it here:
    #   volumes:
    #     - /mnt/host-side-nas:/data/recordings/netgear:rw
    # Then drop SYS_ADMIN from this list to restore an unprivileged
    # container. The capability is narrowly scoped (just mount perms),
    # not full privileged mode.
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor=unconfined
    ports:
      # WS-Discovery multicast listener (UDP 3702). May require host network mode
      # for reliable multicast across the LAN.
      - "3702:3702/udp"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 2g

  # ── Migration runner (runs once, exits) ────────────────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gvd_migrate
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-nvr}:${DB_PASSWORD}@db:5432/gvd_nvr
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
    command: ["python", "-m", "alembic", "upgrade", "head"]
    networks:
      - internal

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${FRONTEND_API_URL:-/api}
        REACT_APP_WS_URL: ${FRONTEND_WS_URL:-/api/ws}
        REACT_APP_GO2RTC_URL: ${FRONTEND_GO2RTC_URL:-/go2rtc}
    container_name: gvd_frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64m
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - internal

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: gvd_nginx
    restart: unless-stopped
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 64m
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # TLS certs are managed by the backend (POST /api/settings/tls/upload or
      # the bootstrap self-signed generator) and exposed to nginx through this
      # shared volume.
      - certs:/etc/nginx/ssl:ro
      - recordings:/data/recordings:ro
      - thumbnails:/data/thumbnails:ro
      - exports:/data/exports:ro
      - hls:/data/hls:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
      go2rtc:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- --no-check-certificate https://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - internal

  # ── Redis (rate limiter + cache) ──────────────────────────────────────────
  # Used by the backend rate limiter (app/core/rate_limiter.py).
  # Persistence disabled — cache is not authoritative.
  redis:
    image: redis:7-alpine
    container_name: gvd_redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "96mb", "--maxmemory-policy", "allkeys-lru", "--save", ""]
    deploy:
      resources:
        limits:
          memory: 128m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    networks:
      - internal

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  db_data:
  go2rtc_data:
  appdata:
  recordings:
  thumbnails:
  exports:
  hls:
  certs:
