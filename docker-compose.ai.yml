# =============================================================================
# Vizor NVR — AI Scenario Plugins
# =============================================================================
# Usage:
#   AI_PLUGIN_API_KEY=<key-with-ai:register> docker compose -f docker-compose.yml -f docker-compose.ai.yml up -d --build
#
# The NVR remains the VMS core. Each scenario runs as a separate container and
# registers its scenario.json manifest with the backend on boot.
# =============================================================================

services:
  # Shared inference server for ALL AI scenarios (FRS, PPE, suspect-search …).
  # Dynamic batching across cameras = high GPU throughput at 64-channel scale,
  # and inference runs in its own process so plugin GIL is a non-issue. Add a
  # new scenario = drop its ONNX + config.pbtxt into the model repo.
  triton:
    image: nvcr.io/nvidia/tritonserver:24.08-py3
    container_name: gvd_ai_triton
    restart: unless-stopped
    # Explicit model control: load ONLY the models listed below, so the GPU isn't
    # filled by every scenario's weights. Add --load-model lines as scenarios are
    # tested. (Switch back to --model-control-mode=poll to auto-load the whole
    # repo.) PPE testing needs just the detector + the SigLIP verifier.
    command: >
      tritonserver
      --model-repository=/models
      --model-control-mode=explicit
      --load-model=ppe_yolo26
      --load-model=siglip_ppe
      --log-verbose=0
      --strict-model-config=false
    networks:
      - internal
    volumes:
      - ./triton/model_repository:/models:ro
    shm_size: "1g"
    deploy:
      resources:
        limits:
          memory: ${TRITON_MEM_LIMIT:-8g}
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "bash", "-lc", "exec 3<>/dev/tcp/127.0.0.1/8000"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 60s

  qdrant:
    # Pin a version — :latest can change the storage format under a running
    # deployment. Bump deliberately + test.
    image: qdrant/qdrant:v1.18.0
    container_name: gvd_ai_qdrant
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - qdrant_data:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: ${QDRANT_MEM_LIMIT:-4g}
    healthcheck:
      test: ["CMD", "bash", "-lc", "exec 3<>/dev/tcp/127.0.0.1/6333"]
      interval: 30s
      timeout: 5s
      retries: 5

  suspect-search-db:
    image: postgres:16-alpine
    container_name: gvd_ai_suspect_search_db
    restart: unless-stopped
    networks:
      - internal
    environment:
      POSTGRES_USER: suspect
      POSTGRES_PASSWORD: ${AI_SUSPECT_SEARCH_DB_PASSWORD:-suspect}
      POSTGRES_DB: suspect_search
    volumes:
      - suspect_search_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suspect -d suspect_search"]
      interval: 15s
      timeout: 5s
      retries: 5

  suspect-search:
    build:
      context: ./scenarios
      dockerfile: suspect-search/Dockerfile
    container_name: gvd_ai_suspect_search
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      qdrant:
        condition: service_started
      suspect-search-db:
        condition: service_healthy
      triton:
        condition: service_started
    environment:
      SCENARIO_SLUG: suspect-search
      VIZOR_BASE_URL: http://backend:8000/api
      VIZOR_API_KEY: ${AI_PLUGIN_API_KEY:-}
      VIZOR_SERVICE_TOKEN: ${AI_PLUGIN_SERVICE_TOKEN:-dev-XNrW79MQknM38BVGRkDZWrUQhJsJ2HUBbYfTOkWAZY0}
      QDRANT_URL: http://qdrant:6333
      SUSPECT_SEARCH_DATABASE_URL: postgresql://suspect:${AI_SUSPECT_SEARCH_DB_PASSWORD:-suspect}@suspect-search-db:5432/suspect_search
      # Inference on the shared Triton server (yolo26 + person_reid + clothing_yolos).
      INFERENCE_BACKEND: ${SUSPECT_INFERENCE_BACKEND:-triton}
      TRITON_URL: ${TRITON_URL:-triton:8000}
      DETECTOR_MODEL_PATH: /models/yolo26.onnx
      REID_MODEL_PATH: /models/person-reid.onnx
      DETECTOR_CLASS_MAP: 0:person,24:bag,26:bag,28:bag
      DETECTOR_BOX_FORMAT: auto
      VECTOR_SIZE: "768"
      DATA_DIR: /data/suspect-search
      THUMB_DIR: /data/suspect-search/thumbs
      PORT: 8091
    networks:
      - internal
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8091", "--reload"]
    volumes:
      - ./scenarios/suspect-search:/app
      - recordings:/data/recordings:ro
      - suspect_search_data:/data/suspect-search
      - ./models:/models:ro
    deploy:
      resources:
        limits:
          memory: ${SUSPECT_MEM_LIMIT:-4g}
          cpus: "${SUSPECT_CPU_LIMIT:-4}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8091/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3

  ppe-db:
    image: postgres:16-alpine
    container_name: gvd_ai_ppe_db
    restart: unless-stopped
    networks:
      - internal
    environment:
      POSTGRES_USER: ppe
      POSTGRES_PASSWORD: ${AI_PPE_DB_PASSWORD:-ppe}
      POSTGRES_DB: ppe
    volumes:
      - ppe_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ppe -d ppe"]
      interval: 15s
      timeout: 5s
      retries: 5

  ppe:
    build:
      context: ./scenarios
      dockerfile: ppe/Dockerfile
    container_name: gvd_ai_ppe
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      ppe-db:
        condition: service_healthy
      triton:
        condition: service_started
    environment:
      SCENARIO_SLUG: ppe
      VIZOR_BASE_URL: http://backend:8000/api
      VIZOR_API_KEY: ${AI_PLUGIN_API_KEY:-}
      VIZOR_SERVICE_TOKEN: ${AI_PLUGIN_SERVICE_TOKEN:-dev-XNrW79MQknM38BVGRkDZWrUQhJsJ2HUBbYfTOkWAZY0}
      PPE_DATABASE_URL: postgresql+psycopg2://ppe:${AI_PPE_DB_PASSWORD:-ppe}@ppe-db:5432/ppe
      DATA_PATH: /data/ppe
      # Inference via the shared Triton server (no in-process GPU). The plugin
      # decodes the raw ppe_yolo26 [1,300,6] output itself.
      INFERENCE_BACKEND: ${PPE_INFERENCE_BACKEND:-triton}
      TRITON_URL: ${TRITON_URL:-triton:8000}
      PPE_MODEL_NAME: ppe_yolo26
      # DINOv2 second-stage helmet/vest verifier (served on Triton). Empty = off.
      PPE_VIT_MODEL_NAME: ${PPE_VIT_MODEL_NAME:-dinov2_small}
      # Live per-camera compliance — pull frames from go2rtc's RTSP restream.
      PPE_LIVE_ENABLED: "true"
      GO2RTC_RTSP_HOST: go2rtc
      GO2RTC_RTSP_PORT: "8554"
      PPE_RETENTION_EVENT_DAYS: ${PPE_RETENTION_EVENT_DAYS:-90}
      PORT: 8092
    networks:
      - internal
    volumes:
      - recordings:/data/recordings:ro
      - ppe_snapshots:/data/ppe
      - ./models:/models:ro
    deploy:
      resources:
        limits:
          # Thin Triton client — no GPU, modest CPU for decode/orchestrate.
          memory: ${PPE_MEM_LIMIT:-4g}
          cpus: "${PPE_CPU_LIMIT:-4}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8092/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3

  anpr-db:
    image: postgres:16-alpine
    container_name: gvd_ai_anpr_db
    restart: unless-stopped
    networks:
      - internal
    environment:
      POSTGRES_USER: anpr
      POSTGRES_PASSWORD: ${AI_ANPR_DB_PASSWORD:-anpr}
      POSTGRES_DB: anpr
    volumes:
      - anpr_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anpr -d anpr"]
      interval: 15s
      timeout: 5s
      retries: 5

  anpr:
    build:
      context: ./scenarios
      dockerfile: anpr/Dockerfile
    container_name: gvd_ai_anpr
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      anpr-db:
        condition: service_healthy
      triton:
        condition: service_started
    environment:
      SCENARIO_SLUG: anpr
      VIZOR_BASE_URL: http://backend:8000/api
      VIZOR_API_KEY: ${AI_PLUGIN_API_KEY:-}
      VIZOR_SERVICE_TOKEN: ${AI_PLUGIN_SERVICE_TOKEN:-dev-XNrW79MQknM38BVGRkDZWrUQhJsJ2HUBbYfTOkWAZY0}
      ANPR_DATABASE_URL: postgresql+psycopg2://anpr:${AI_ANPR_DB_PASSWORD:-anpr}@anpr-db:5432/anpr
      DATA_PATH: /data/anpr
      # Inference via the shared Triton server (no in-process GPU). The plugin
      # decodes the raw anpr_plate / ppocr_v6 / yolo26 outputs itself; the
      # dict_v6.txt charset ships in the image for the client-side CTC decode.
      INFERENCE_BACKEND: ${ANPR_INFERENCE_BACKEND:-triton}
      TRITON_URL: ${TRITON_URL:-triton:8000}
      ANPR_PLATE_MODEL_NAME: anpr_plate
      ANPR_OCR_MODEL_NAME: ppocr_v6
      ANPR_VEHICLE_MODEL_NAME: yolo26
      # Live per-camera ANPR — pull frames from go2rtc's RTSP restream.
      ANPR_LIVE_ENABLED: "true"
      GO2RTC_RTSP_HOST: go2rtc
      GO2RTC_RTSP_PORT: "8554"
      ANPR_RETENTION_EVENT_DAYS: ${ANPR_RETENTION_EVENT_DAYS:-90}
      PORT: 8094
    networks:
      - internal
    volumes:
      - recordings:/data/recordings:ro
      - anpr_snapshots:/data/anpr
      - ./models:/models:ro
    deploy:
      resources:
        limits:
          # Thin Triton client — no GPU, modest CPU for decode/orchestrate.
          memory: ${ANPR_MEM_LIMIT:-4g}
          cpus: "${ANPR_CPU_LIMIT:-4}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8094/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3

  frs-db:
    image: postgres:16-alpine
    container_name: gvd_ai_frs_db
    restart: unless-stopped
    networks:
      - internal
    environment:
      POSTGRES_USER: frs
      POSTGRES_PASSWORD: ${AI_FRS_DB_PASSWORD:-frs}
      POSTGRES_DB: frs
    volumes:
      - frs_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frs -d frs"]
      interval: 15s
      timeout: 5s
      retries: 5

  frs:
    build:
      context: ./scenarios
      dockerfile: frs/Dockerfile
    container_name: gvd_ai_frs
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      qdrant:
        condition: service_started
      frs-db:
        condition: service_healthy
      triton:
        condition: service_started
    environment:
      SCENARIO_SLUG: frs
      VIZOR_BASE_URL: http://backend:8000/api
      VIZOR_API_KEY: ${AI_PLUGIN_API_KEY:-}
      VIZOR_SERVICE_TOKEN: ${AI_PLUGIN_SERVICE_TOKEN:-dev-XNrW79MQknM38BVGRkDZWrUQhJsJ2HUBbYfTOkWAZY0}
      FRS_DATABASE_URL: postgresql+psycopg2://frs:${AI_FRS_DB_PASSWORD:-frs}@frs-db:5432/frs
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: vizor_frs_faces
      DATA_PATH: /data/frs
      # Inference via the shared Triton server (no in-process GPU). The model
      # *_PATH vars now only flag which models exist for the status endpoint.
      INFERENCE_BACKEND: ${FRS_INFERENCE_BACKEND:-triton}
      TRITON_URL: ${TRITON_URL:-triton:8000}
      DETECTOR_MODEL_PATH: /models/scrfd_10g.onnx
      EMBED_MODEL_PATH: /models/arcface_r50.onnx
      ANTISPOOF_MODEL_PATH: /models/antispoofing.onnx
      FAIRFACE_MODEL_PATH: /models/fairface.onnx
      # Live per-camera recognition — pull frames from go2rtc's RTSP restream.
      FRS_LIVE_ENABLED: "true"
      GO2RTC_RTSP_HOST: go2rtc
      GO2RTC_RTSP_PORT: "8554"
      FRS_RECORDINGS_ROOT: /data/recordings
      FRS_RETENTION_EVENT_DAYS: ${FRS_RETENTION_EVENT_DAYS:-90}
      PORT: 8093
    networks:
      - internal
    volumes:
      - recordings:/data/recordings:ro
      - frs_photos:/data/frs
    deploy:
      resources:
        limits:
          # Thin Triton client — no GPU, modest CPU for decode/orchestrate.
          memory: ${FRS_MEM_LIMIT:-4g}
          cpus: "${FRS_CPU_LIMIT:-4}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8093/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  qdrant_data:
  suspect_search_db_data:
  suspect_search_data:
  frs_db_data:
  frs_photos:
  ppe_db_data:
  ppe_snapshots:
  anpr_db_data:
  anpr_snapshots:
