name: CI

on:
  push:
    branches: [main, refactor]
  pull_request:
    branches: [main, refactor]

# Concurrency: kill in-progress runs on the same ref. Saves CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Backend: lint + test on Postgres + TimescaleDB
  # ──────────────────────────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    services:
      # CI uses plain TimescaleDB image, same as docker-compose prod
      db:
        image: timescale/timescaledb:2.17.2-pg16
        env:
          POSTGRES_DB: gvd_nvr_test
          POSTGRES_USER: nvr
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://nvr:testpass@localhost:5432/gvd_nvr_test
      JWT_SECRET_KEY: ci-secret-not-for-prod
      STORAGE_PATH: /tmp/vizor-test/recordings
      DATA_PATH: /tmp/vizor-test/data
      METROPOLIS_REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check app scripts

      - name: Format check (black)
        working-directory: backend
        run: black --check app scripts

      - name: Run Alembic migrations against test DB
        working-directory: backend
        run: alembic upgrade head

      - name: Seed AI scenarios
        working-directory: backend
        run: |
          python -c "
          import asyncio
          from app.database import async_session_maker
          from app.ai.seed import seed_ai_scenarios
          async def main():
              async with async_session_maker() as db:
                  n = await seed_ai_scenarios(db)
                  print(f'Seeded {n} scenarios')
          asyncio.run(main())
          "

      - name: Run tests
        working-directory: backend
        run: pytest -v --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ──────────────────────────────────────────────────────────────────
  # Frontend: lint + build
  # ──────────────────────────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # --legacy-peer-deps because of a known React 19 + RJSF peer mismatch
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        env:
          REACT_APP_BACKEND_URL: http://localhost:8000
        run: npm run build

  # ──────────────────────────────────────────────────────────────────
  # Image build verification (no push). Catches Dockerfile drift.
  # ──────────────────────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t vizor-nvr-backend:ci backend

      - name: Build frontend image
        run: docker build -t vizor-nvr-frontend:ci frontend
